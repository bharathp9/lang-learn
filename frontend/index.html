<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangLearn - Learn Languages!</title>
    <meta name="description" content="Fun Telugu language learning app for kids. Speak Telugu in 30 days with games!">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#004E89',
                        accent: '#FCBF49',
                        success: '#2EC4B6',
                        dark: '#1A1A2E',
                        light: '#F7F7F7',
                    },
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <style>
        * { font-family: 'Nunito', sans-serif; }
        h1, h2, h3, h4, .font-display { font-family: 'Fredoka', sans-serif; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #FF6B35 0%, #FCBF49 100%);
        }
        
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .bounce-in {
            animation: bounceIn 0.5s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 107, 53, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 107, 53, 0.8); }
        }
        
        .streak-fire {
            animation: fireFlicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes fireFlicker {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .progress-bar {
            transition: width 0.5s ease-out;
        }
        
        .word-card {
            perspective: 1000px;
        }
        
        .word-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .word-card.flipped .word-card-inner {
            transform: rotateY(180deg);
        }
        
        .word-card-front, .word-card-back {
            backface-visibility: hidden;
        }
        
        .word-card-back {
            transform: rotateY(180deg);
        }
        
        /* Speech animation */
        .speaking-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 30px;
        }
        .speaking-wave span {
            width: 4px;
            background: #FF6B35;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .speaking-wave span:nth-child(2) { animation-delay: 0.1s; }
        .speaking-wave span:nth-child(3) { animation-delay: 0.2s; }
        .speaking-wave span:nth-child(4) { animation-delay: 0.3s; }
        .speaking-wave span:nth-child(5) { animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }
        
        /* Game timer */
        .timer-ring {
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="bg-light min-h-screen">
    <div id="app"></div>
    
    <script type="module" src="./js/app.js"></script>
</body>
</html>
